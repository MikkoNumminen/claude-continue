name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Test the supported floor (3.9 — the runtime invariant: no 3.10+ syntax) and
    # a current version, across all three OSes.
    name: tests (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -p "test_*.py"

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install ".[dev]"
      - run: ruff check src tests

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install ".[dev]"
      - run: mypy src/claude_continue

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history, so a secret in ANY commit is caught
      - name: Run gitleaks
        run: |
          ver=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          # uses .gitleaks.toml at the repo root (default rules + an Anthropic sk-ant- rule)
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  build-windows-exe:
    name: build windows exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build claude-continue.exe
        shell: pwsh
        run: .\packaging\build-windows.ps1
      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-continue-windows-exe
          path: dist/claude-continue.exe
          if-no-files-found: error

  build-macos-app:
    name: build macos app
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build claude-continue.app
        run: ./packaging/build-macos.sh
      - name: Zip the .app (ditto preserves the bundle + signature)
        run: ditto -c -k --keepParent dist/claude-continue.app claude-continue-macos-arm64.zip
      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-continue-macos-app
          path: claude-continue-macos-arm64.zip
          if-no-files-found: error
